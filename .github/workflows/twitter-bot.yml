name: Twitter Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run bot
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CONFIG_ACCOUNTS: ${{ secrets.CONFIG_ACCOUNTS }}
          CONFIG_MIN_ENGAGEMENT: ${{ secrets.CONFIG_MIN_ENGAGEMENT }}
          CONFIG_MAX_REPLIES_PER_DAY: ${{ secrets.CONFIG_MAX_REPLIES_PER_DAY }}
          CONFIG_COOLDOWN_HOURS: ${{ secrets.CONFIG_COOLDOWN_HOURS }}
          DRY_RUN: ${{ secrets.DRY_RUN }}
          COST_LIMIT_USD: ${{ secrets.COST_LIMIT_USD }}
          LOG_LEVEL: INFO
        run: npm run bot
