name: Twitter Bot

on:
  schedule:
    # GitHub cron uses UTC; these map to JST (UTC+9):
    # 23:00 UTC -> 08:00 JST (next day)
    # 03:00 UTC -> 12:00 JST
    # 07:00 UTC -> 16:00 JST
    # 10:00 UTC -> 19:00 JST
    - cron: '0 23 * * *'
    - cron: '0 3 * * *'
    - cron: '0 7 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run bot
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_OAUTH2_ACCESS_TOKEN: ${{ secrets.TWITTER_OAUTH2_ACCESS_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CONFIG_ACCOUNTS: ${{ secrets.CONFIG_ACCOUNTS }}
          CONFIG_MIN_ENGAGEMENT: ${{ secrets.CONFIG_MIN_ENGAGEMENT }}
          CONFIG_MAX_REPLIES_PER_DAY: ${{ secrets.CONFIG_MAX_REPLIES_PER_DAY }}
          CONFIG_COOLDOWN_HOURS: ${{ secrets.CONFIG_COOLDOWN_HOURS }}
          DRY_RUN: ${{ secrets.DRY_RUN }}
          COST_LIMIT_USD: ${{ secrets.COST_LIMIT_USD }}
          LOG_LEVEL: INFO
        run: npm run bot
